<style>

    --creme-dark: #efe5d5;

    --gold-light: #e8d5b0;
    --gold-dark: #a07840;
    --brown: #6b4c2a;

    --text-light: #7a6050;

  .box {

    text-align: center; max-width: 520px;
  }

  .logo {
    width: 64px; height: 64px;
    border-radius: 50%; border: 1.5px solid var(--gold);
    object-fit: cover;
    margin: 0 auto 28px; display: block;
    background: var(--creme);
  }

  .code {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(80px, 18vw, 140px);
    font-weight: 300; line-height: 1;
    color: var(--gold-dark); letter-spacing: 0.02em;
  }

  .divider {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin: 6px 0 22px;
  }
  .divider span { width: 44px; height: 1px; background: var(--gold); }
  .divider em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 18px; color: var(--gold);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 5vw, 36px);
    font-weight: 400; color: var(--brown-dark);
    line-height: 1.2; margin-bottom: 16px;
  }
  h1 em { font-style: italic; color: var(--gold-dark); }

  p {
    font-size: 14px; font-weight: 300; line-height: 1.8;
    color: var(--text-light); max-width: 420px; margin: 0 auto 36px;
  }

  .actions {
    display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 32px; border-radius: 2px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; text-decoration: none;
    transition: all 0.3s;
  }
  .btn-primary { background: var(--brown); color: var(--gold-light); }
  .btn-primary:hover { background: var(--brown-dark); }
  .btn-ghost { border: 1.5px solid var(--brown); color: var(--brown); }
  .btn-ghost:hover { background: var(--brown); color: var(--gold-light); }
  .btn svg { width: 16px; height: 16px; }

  .cremec {
    margin-top: 40px; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold-dark); opacity: 0.7;
  }
</style>
